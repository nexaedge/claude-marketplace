name: Bump version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip-bump]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect what changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -q '^plugins/spec-plugin/'; then
            echo "plugin_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "plugin_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^\.claude-plugin/|^README\.md$|^CLAUDE\.md$'; then
            echo "marketplace_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "marketplace_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin version
        if: steps.changes.outputs.plugin_changed == 'true'
        run: |
          CURRENT=$(jq -r '.version' plugins/spec-plugin/.claude-plugin/plugin.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' plugins/spec-plugin/.claude-plugin/plugin.json > tmp.json
          mv tmp.json plugins/spec-plugin/.claude-plugin/plugin.json
          echo "PLUGIN_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Bumped plugin: $CURRENT → $NEW_VERSION"

      - name: Bump marketplace version
        if: steps.changes.outputs.marketplace_changed == 'true'
        run: |
          CURRENT=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.metadata.version = $v' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json
          echo "MARKETPLACE_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Bumped marketplace: $CURRENT → $NEW_VERSION"

      - name: Update CHANGELOG
        if: steps.changes.outputs.plugin_changed == 'true' || steps.changes.outputs.marketplace_changed == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          ENTRY=""

          if [ -n "${PLUGIN_VERSION:-}" ]; then
            COMMIT_MSG=$(git log -1 --format='%s' HEAD)
            ENTRY="${ENTRY}## [Plugin: spec-plugin v${PLUGIN_VERSION}] - ${DATE}\n\n### Changed\n- ${COMMIT_MSG}\n\n"
          fi

          if [ -n "${MARKETPLACE_VERSION:-}" ]; then
            COMMIT_MSG=$(git log -1 --format='%s' HEAD)
            ENTRY="${ENTRY}## [Marketplace v${MARKETPLACE_VERSION}] - ${DATE}\n\n### Changed\n- ${COMMIT_MSG}\n\n"
          fi

          # Insert after the versioning note (line 8, after the blank line following the bullet list)
          awk -v entry="$ENTRY" '
            /^## \[/ && !inserted {
              printf entry
              inserted=1
            }
            { print }
          ' CHANGELOG.md > tmp_changelog.md
          mv tmp_changelog.md CHANGELOG.md

      - name: Commit and push
        if: steps.changes.outputs.plugin_changed == 'true' || steps.changes.outputs.marketplace_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PARTS=""
          [ -n "${PLUGIN_VERSION:-}" ] && PARTS="plugin v${PLUGIN_VERSION}"
          [ -n "${MARKETPLACE_VERSION:-}" ] && PARTS="${PARTS:+$PARTS, }marketplace v${MARKETPLACE_VERSION}"

          git add plugins/spec-plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: bump ${PARTS} [skip-bump]"
          git push
